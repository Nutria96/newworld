name: Deploy production to Netlify

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate fresh sitemap
        run: node generate-sitemap.js

      - name: Install publisher dependencies
        run: npm install --omit=dev

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Deploy production
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: netlify deploy --prod --dir=. --functions=netlify/functions --message="GitHub Actions ${GITHUB_SHA}"

      - name: Confirm native Netlify deployment
        if: env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == ''
        run: echo "Netlify CLI secrets are not configured; the connected Netlify Git integration handles this push."

      - name: Restore publisher rate-limit audit
        uses: actions/cache@v4
        with:
          path: log.txt
          key: publisher-log-${{ github.run_id }}
          restore-keys: |
            publisher-log-

      - name: Announce successful deployment
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          PUBLISHER_DRY_RUN: "false"
        run: node publisher.js --post "Nueva versión de CHONGSEB desplegada." --platforms linkedin,facebook
