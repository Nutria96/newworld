name: Deploy production to Netlify

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      # Add NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID under:
      # GitHub repository > Settings > Secrets and variables > Actions.
      - name: Deploy production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --prod --dir=public --functions=netlify/functions --message="GitHub Actions ${GITHUB_SHA}"
