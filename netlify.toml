[build]
  command = "echo No build needed"
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "zisi"

[[redirects]]
  from = "/apoyar"
  to = "/apoyar.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/clasico"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/viaje"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/adult"
  to = "/adult/index.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

[[headers]]
  for = "/adult/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/adult"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/account/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/account"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://storage.googleapis.com https://*.googleapis.com; img-src 'self' data: blob: https://storage.googleapis.com; media-src 'self' blob: https://storage.googleapis.com; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
